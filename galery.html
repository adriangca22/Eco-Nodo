<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover" />
  <title>Render Fotorealista | Studio Visual</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:'Poppins',sans-serif;
      background:#07000d;
      min-height: 100vh;
      overflow-x: hidden;
      overflow-y: auto;
    }

    /* El hero ahora permite scroll en mobile */
    .hero{
      width:100%;
      min-height: 100vh;
      position:relative;
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding: 5rem 9%;
      gap: 3rem;
      overflow: hidden;
      background:
        radial-gradient(circle at 30% 20%,
        rgba(183,0,255,.35) 0%,
        rgba(90,0,120,.25) 40%,
        rgba(10,0,20,1) 80%);
      flex-wrap: wrap;
    }

    /* Grid background más elegante */
    .hero::before{
      content:"";
      position:absolute;
      inset:0;
      background-image:
        linear-gradient(rgba(255,0,255,.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,0,255,.06) 1px, transparent 1px);
      background-size:36px 36px;
      mask-image: radial-gradient(circle at center, black 25%, transparent 85%);
      opacity:.5;
      pointer-events: none;
    }

    /* ===== CARD REDISEÑADA - MÁS COMPACTA EN MOBILE ===== */
    .card{
      position:relative;
      z-index:2;
      width: 100%;
      max-width: 340px;
      padding: 28px 26px;
      border-radius: 32px;
      background: rgba(9,8,20,0.85);
      backdrop-filter: blur(2px);
      border:1px solid rgba(255,0,255,.25);
      box-shadow:
        0 30px 50px -20px rgba(0,0,0,0.9),
        0 0 0 1px rgba(255,255,255,.02) inset,
        0 0 35px rgba(255,0,255,.12);
      text-align:center;
      transition: transform 0.3s ease;
    }
    .card:hover {
      transform: translateY(-5px);
      border-color: rgba(255,0,255,.45);
    }

    .icon-wrap{
      width:70px;
      height:70px;
      margin:0 auto 16px;
      border-radius: 24px;
      display:flex;
      align-items:center;
      justify-content:center;
      border:2px solid #ff00ff55;
      box-shadow: 0 0 18px rgba(255,0,255,.25);
      background: linear-gradient(135deg, #1a0f2e, #0b0520);
    }

    .cube{
      width:32px;
      height:32px;
      border:4px solid #fff;
      border-radius:10px;
      transform:rotate(45deg);
      position:relative;
      box-shadow: 0 0 8px rgba(255,255,255,0.5);
    }

    .cube::after{
      content:"";
      position:absolute;
      width:14px;
      height:14px;
      background:#fff;
      right:-6px;
      top:8px;
      border-radius: 2px;
      box-shadow: 0 0 5px #fff;
    }

    .card h1{
      color:#fff;
      font-size:1.8rem;
      line-height:1.2;
      margin-bottom:12px;
      font-weight:700;
      letter-spacing:-0.5px;
      background: linear-gradient(135deg, #ffffff, #e0a0ff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .card p{
      color:#dddddd;
      font-size:0.85rem;
      line-height:1.45;
      font-weight:400;
      margin-bottom:20px;
      opacity:0.9;
    }

    .blender{
      width:58px;
      margin-bottom:18px;
      filter:drop-shadow(0 0 12px rgba(255,170,0,.4));
      transition: filter 0.3s;
    }
    .blender:hover {
      filter:drop-shadow(0 0 18px rgba(255,170,0,.7));
    }

    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      width:170px;
      height:48px;
      border-radius:60px;
      text-decoration:none;
      color:#fff;
      font-weight:600;
      letter-spacing:1px;
      font-size:0.9rem;
      border:2px solid rgba(255,0,255,.4);
      background: linear-gradient(135deg, rgba(255,0,255,.12), rgba(255,0,255,.02));
      box-shadow: inset 0 0 12px rgba(255,0,255,.1), 0 0 18px rgba(255,0,255,.1);
      transition: all 0.3s ease;
      backdrop-filter: blur(4px);
      cursor: pointer;
    }

    .btn:hover{
      transform: translateY(-4px);
      box-shadow: 0 12px 28px rgba(255,0,255,.3);
      border-color: #ff44ff;
      background: linear-gradient(135deg, rgba(255,0,255,.2), rgba(255,0,255,.05));
    }

    /* ===== CARRUSEL MEJORADO PARA MOBILE ===== */
    .soda-area{
      position:relative;
      z-index:2;
      width: auto;
      flex: 1;
      min-width: 280px;
      display:flex;
      flex-direction: column;
      justify-content:center;
      align-items:center;
    }

    .carousel-container {
      position: relative;
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 28px;
    }

    .carousel-track {
      position: relative;
      width: 500px;
      height: 500px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .carousel-item {
      position: absolute;
      width: 100%;
      opacity: 0;
      transform: rotate(-12deg) scale(0.85) translateY(35px);
      transition: opacity 0.55s cubic-bezier(0.2, 0.9, 0.4, 1.1), 
                  transform 0.55s cubic-bezier(0.2, 0.85, 0.3, 1);
      filter: drop-shadow(0 40px 35px rgba(0,0,0,.9)) drop-shadow(0 0 25px rgba(255,0,255,.25));
      pointer-events: none;
    }

    .carousel-item.active {
      opacity: 1;
      transform: rotate(-8deg) scale(1) translateY(0px);
      z-index: 20;
    }

    /* GIFS - TAMAÑO RESPONSIVO */
    .soda-gif, .laptop-gif {
      width: 100%;
      max-width: 480px;
      display: block;
      margin: 0 auto;
      animation: floatItem 4.5s ease-in-out infinite;
      border-radius: 20px;
      transition: filter 0.3s;
    }

    @keyframes floatItem {
      0%,100% {
        transform: translateY(0px);
      }
      50% {
        transform: translateY(-16px);
      }
    }

    /* Sombra dinámica mejorada */
    .dynamic-shadow {
      position: absolute;
      bottom: -35px;
      left: 50%;
      transform: translateX(-50%);
      width: 380px;
      height: 40px;
      background: radial-gradient(ellipse, rgba(0,0,0,0.9) 0%, rgba(0, 0, 0, 0.5) 45%, transparent 85%);
      filter: blur(14px);
      border-radius: 50%;
      pointer-events: none;
      z-index: 1;
      transition: width 0.4s cubic-bezier(0.2, 0.9, 0.4, 1), opacity 0.3s ease;
    }

    /* INDICADORES */
    .carousel-indicators {
      position: relative;
      bottom: auto;
      left: auto;
      transform: none;
      display: flex;
      gap: 20px;
      justify-content: center;
      align-items: center;
      z-index: 25;
      background: rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(12px);
      padding: 8px 24px;
      border-radius: 60px;
      border: 1px solid rgba(255, 0, 255, 0.4);
      width: fit-content;
      margin: 0 auto;
    }

    .indicator {
      width: 12px;
      height: 12px;
      border-radius: 30px;
      background: rgba(255, 255, 255, 0.5);
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.2, 0.8, 0.4, 1);
    }

    .indicator.active {
      background: #ff44ff;
      width: 32px;
      border-radius: 20px;
      box-shadow: 0 0 14px #ff44ff;
    }

    .indicator:hover {
      background: #ffaaff;
      transform: scale(1.2);
    }

    /* ===== RESPONSIVE TOTAL: AJUSTE PARA MÓVIL (TARTA) ===== */
    @media (max-width: 1000px) {
      .hero {
        flex-direction: column;
        justify-content: center;
        padding: 3rem 1.5rem;
        gap: 3rem;
        min-height: auto;
      }
      .card {
        max-width: 380px;
        margin: 0 auto;
      }
      .soda-area {
        width: 100%;
        margin-top: 0;
      }
      .carousel-track {
        width: 380px;
        height: 380px;
      }
      .soda-gif, .laptop-gif {
        max-width: 360px;
      }
      .dynamic-shadow {
        width: 280px;
        height: 32px;
        bottom: -28px;
      }
      .carousel-indicators {
        padding: 6px 20px;
        gap: 16px;
      }
    }

    @media (max-width: 680px) {
      .hero {
        padding: 2rem 1.2rem;
        gap: 2.2rem;
      }
      .card {
        padding: 22px 18px;
        max-width: 100%;
        border-radius: 28px;
      }
      .card h1 {
        font-size: 1.6rem;
      }
      .card p {
        font-size: 0.8rem;
        margin-bottom: 16px;
      }
      .icon-wrap {
        width: 60px;
        height: 60px;
        margin-bottom: 12px;
      }
      .cube {
        width: 28px;
        height: 28px;
        border-width: 3px;
      }
      .cube::after {
        width: 10px;
        height: 10px;
        right: -5px;
        top: 6px;
      }
      .blender {
        width: 48px;
        margin-bottom: 14px;
      }
      .btn {
        width: 150px;
        height: 44px;
        font-size: 0.8rem;
      }
      .carousel-track {
        width: 300px;
        height: 300px;
      }
      .soda-gif, .laptop-gif {
        max-width: 280px;
      }
      .dynamic-shadow {
        width: 220px;
        height: 26px;
        bottom: -20px;
        filter: blur(12px);
      }
      .carousel-indicators {
        gap: 12px;
        padding: 5px 18px;
      }
      .indicator {
        width: 8px;
        height: 8px;
      }
      .indicator.active {
        width: 28px;
      }
    }

    @media (max-width: 480px) {
      .hero {
        padding: 1.8rem 1rem;
        gap: 1.8rem;
      }
      .card {
        padding: 18px 16px;
      }
      .card h1 {
        font-size: 1.45rem;
      }
      .carousel-track {
        width: 260px;
        height: 260px;
      }
      .soda-gif, .laptop-gif {
        max-width: 240px;
      }
      .dynamic-shadow {
        width: 180px;
        height: 22px;
        bottom: -16px;
        filter: blur(10px);
      }
      .carousel-indicators {
        padding: 4px 14px;
        gap: 10px;
      }
    }

    /* Ajuste de animación para evitar recortes */
    .carousel-item {
      will-change: transform, opacity;
    }
  </style>
</head>

<body>
  <section class="hero">

    <!-- CARD REDISEÑADA -->
    <div class="card">
      <div class="icon-wrap">
        <div class="cube"></div>
      </div>
      <h1>Render Fotorealista</h1>
      <p>
        Visualización en alta fidelidad para exhibir productos,
        packaging y previsualización de proyectos. Estrategia
        de branding con imágenes comerciales de impacto.
      </p>
      <img
        class="blender"
        src="https://upload.wikimedia.org/wikipedia/commons/0/0c/Blender_logo_no_text.svg"
        alt="Blender"
      >
      <br>
      <a href="#" class="btn">
        COTIZAR PROYECTO
      </a>
    </div>

    <!-- CARRUSEL: SODA.GIF + LAPTOP.GIF (totalmente fluido) -->
    <div class="soda-area">
      <div class="carousel-container">
        <div class="carousel-track">
          <!-- Soda GIF item -->
          <div class="carousel-item" id="item-soda">
            <img src="soda.gif" alt="Lata Soda Render" class="soda-gif" loading="eager">
          </div>
          <!-- Laptop GIF item -->
          <div class="carousel-item" id="item-laptop">
            <img src="laptop.gif" alt="Laptop Render" class="laptop-gif" loading="eager">
          </div>
        </div>
        <div class="dynamic-shadow" id="dynamicShadow"></div>
      </div>

      <!-- Indicadores interactivos -->
      <div class="carousel-indicators">
        <div class="indicator" data-index="0" id="indicator-soda"></div>
        <div class="indicator" data-index="1" id="indicator-laptop"></div>
      </div>
    </div>
  </section>

  <script>
    (function() {
      const sodaItem = document.getElementById('item-soda');
      const laptopItem = document.getElementById('item-laptop');
      const indicatorSoda = document.getElementById('indicator-soda');
      const indicatorLaptop = document.getElementById('indicator-laptop');
      const shadowDiv = document.getElementById('dynamicShadow');

      let currentIndex = 0; // 0: soda, 1: laptop
      let intervalId = null;
      let isTransitioning = false;

      // Función para actualizar sombra según el item activo y responsive
      function updateShadowSize() {
        if (!shadowDiv) return;
        const isMobile = window.innerWidth <= 680;
        const isTablet = window.innerWidth <= 1000 && window.innerWidth > 680;
        
        if (currentIndex === 0) {  // soda
          if (isMobile) {
            shadowDiv.style.width = '200px';
          } else if (isTablet) {
            shadowDiv.style.width = '240px';
          } else {
            shadowDiv.style.width = '360px';
          }
          shadowDiv.style.background = 'radial-gradient(ellipse, rgba(0,0,0,0.9) 0%, rgba(0, 0, 0, 0.5) 50%, transparent 85%)';
        } else {  // laptop
          if (isMobile) {
            shadowDiv.style.width = '210px';
          } else if (isTablet) {
            shadowDiv.style.width = '260px';
          } else {
            shadowDiv.style.width = '390px';
          }
          shadowDiv.style.background = 'radial-gradient(ellipse, rgba(0,0,0,0.9) 0%, rgba(0, 0, 0, 0.45) 50%, transparent 85%)';
        }
      }

      function setActiveItem(index) {
        if (isTransitioning) return;
        if (index === currentIndex) return;
        
        isTransitioning = true;
        
        if (index === 0) {
          // Activar soda
          sodaItem.classList.add('active');
          laptopItem.classList.remove('active');
          indicatorSoda.classList.add('active');
          indicatorLaptop.classList.remove('active');
          currentIndex = 0;
        } else {
          // Activar laptop
          laptopItem.classList.add('active');
          sodaItem.classList.remove('active');
          indicatorSoda.classList.remove('active');
          indicatorLaptop.classList.add('active');
          currentIndex = 1;
        }
        
        // Actualizar sombra después del cambio
        updateShadowSize();
        
        setTimeout(() => {
          isTransitioning = false;
        }, 550);
      }

      function nextSlide() {
        if (isTransitioning) return;
        let nextIndex = currentIndex === 0 ? 1 : 0;
        setActiveItem(nextIndex);
      }

      function startCarousel() {
        if (intervalId) clearInterval(intervalId);
        intervalId = setInterval(() => {
          nextSlide();
        }, 4400);
      }

      function stopCarousel() {
        if (intervalId) {
          clearInterval(intervalId);
          intervalId = null;
        }
      }

      function resetCarouselTimer() {
        stopCarousel();
        startCarousel();
      }

      // Eventos con indicadores (táctil + mouse)
      indicatorSoda.addEventListener('click', (e) => {
        e.preventDefault();
        e.stopPropagation();
        if (currentIndex !== 0 && !isTransitioning) {
          setActiveItem(0);
          resetCarouselTimer();
        }
      });

      indicatorLaptop.addEventListener('click', (e) => {
        e.preventDefault();
        e.stopPropagation();
        if (currentIndex !== 1 && !isTransitioning) {
          setActiveItem(1);
          resetCarouselTimer();
        }
      });

      // Pausa al hover/touch sobre el área del carrusel
      const carouselContainer = document.querySelector('.carousel-container');
      if (carouselContainer) {
        carouselContainer.addEventListener('mouseenter', () => {
          stopCarousel();
        });
        carouselContainer.addEventListener('mouseleave', () => {
          if (!intervalId) startCarousel();
        });
        // Para dispositivos táctiles: pausar con touchstart sin conflictos
        carouselContainer.addEventListener('touchstart', () => {
          stopCarousel();
        }, { passive: true });
        carouselContainer.addEventListener('touchend', () => {
          setTimeout(() => {
            if (!intervalId) startCarousel();
          }, 300);
        });
      }

      // Redimension ventana -> ajustar sombra dinámicamente
      window.addEventListener('resize', () => {
        updateShadowSize();
      });

      // Inicializar estado: soda activo
      sodaItem.classList.add('active');
      laptopItem.classList.remove('active');
      indicatorSoda.classList.add('active');
      indicatorLaptop.classList.remove('active');
      currentIndex = 0;
      
      // Configuración de sombra inicial
      updateShadowSize();
      
      // Iniciar rotación automática
      startCarousel();

      // Limpiar intervalo al abandonar la página (opcional)
      window.addEventListener('beforeunload', () => {
        if (intervalId) clearInterval(intervalId);
      });

      // Pequeña mejora: precargar imágenes si fallan (por si acaso)
      const images = document.querySelectorAll('.soda-gif, .laptop-gif');
      images.forEach(img => {
        if (img.complete === false) {
          img.onerror = () => {
            console.warn('No se pudo cargar: ' + img.src);
          };
        }
      });
    })();
  </script>
</body>
</html>
